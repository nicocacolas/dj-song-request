<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎛️ DJ — Song Requests</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #07070f;
    --surface: #0f0f1c;
    --card:    #13131f;
    --border:  rgba(255,255,255,0.07);
    --text:    #e4e4f2;
    --sub:     #55557a;
    --accent:  #7c6bff;
    --green:   #3dffc0;
    --pink:    #ff4d8d;
  }

  html.light {
    --bg:      #f0f0f0;
    --surface: #e0e0e0;
    --card:    #ffffff;
    --border:  rgba(0,0,0,0.1);
    --text:    #080810;
    --sub:     #555570;
    --accent:  #4b3bcc;
    --green:   #007a55;
    --pink:    #cc1a55;
  }
  html.light header {
    background: rgba(240,240,240,0.95);
    border-bottom-color: rgba(0,0,0,0.1);
  }
  html.light .live-badge {
    background: rgba(0,122,85,.1);
    border-color: rgba(0,122,85,.3);
  }
  html.light .card::before { opacity: .4; }
  html.light .section-divider { border-color: rgba(0,0,0,0.1); }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(7,7,15,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: .9rem 1.6rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left { display: flex; align-items: center; gap: .9rem; }

  .dj-title {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -.02em;
    background: linear-gradient(120deg, var(--green) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: .35rem;
    background: rgba(61,255,192,.08);
    border: 1px solid rgba(61,255,192,.22);
    border-radius: 50px;
    padding: .22rem .65rem;
    font-size: .7rem;
    font-weight: 700;
    color: var(--green);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: .35; transform: scale(.65); }
  }

  .header-right {
    font-size: .78rem;
    color: var(--sub);
    font-weight: 500;
  }

  /* ── Main ── */
  main {
    padding: 1.2rem 1.4rem 5rem;
  }

  /* ── Section labels ── */
  .section-label {
    display: flex;
    align-items: center;
    gap: .5rem;
    font-size: .68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--sub);
    margin: 1.2rem 0 .75rem;
  }
  .section-label .badge {
    background: rgba(255,255,255,.07);
    border-radius: 20px;
    padding: .08rem .5rem;
    font-size: .65rem;
  }

  /* ── Card ── */
  .card {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: .85rem 1rem;
    margin-bottom: .55rem;
    transition: border-color .3s, box-shadow .3s, opacity .4s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(124,107,255,.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .card.new-card {
    animation: slide-in .45s cubic-bezier(.16,1,.3,1);
    border-color: rgba(124,107,255,.45);
    box-shadow: 0 0 24px rgba(124,107,255,.12), 0 0 0 1px rgba(124,107,255,.1);
    animation: slide-in .45s cubic-bezier(.16,1,.3,1), glow-fade 2.5s ease-out .45s forwards;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(-18px) scale(.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes glow-fade {
    from { border-color: rgba(124,107,255,.45); box-shadow: 0 0 24px rgba(124,107,255,.12); }
    to   { border-color: var(--border); box-shadow: none; }
  }

  .card.played {
    opacity: .28;
    filter: grayscale(.8);
  }
  .card.played .card-song { text-decoration: line-through; }

  /* Art */
  .card-art {
    width: 100px; height: 100px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface);
  }
  .card-art-placeholder {
    width: 100px; height: 100px;
    border-radius: 10px;
    background: linear-gradient(135deg, #1b1b2e, #242438);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
  }

  /* Info */
  .card-info { flex: 1; min-width: 0; }

  .card-song {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
    margin-bottom: .3rem;
  }

  .card-artist {
    font-size: 1.5rem;
    color: var(--sub);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: .25rem;
  }

  .card-requester {
    font-size: 1rem;
    color: rgba(85,85,122,.7);
    font-weight: 500;
  }
  .card-requester em {
    font-style: normal;
    color: var(--accent);
    font-weight: 600;
  }

  /* Card buttons group */
  .card-actions {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: .4rem;
    align-items: stretch;
  }

  /* Preview button */
  .preview-btn {
    background: rgba(124,107,255,.08);
    border: 1px solid rgba(124,107,255,.22);
    color: var(--accent);
    border-radius: 10px;
    padding: .45rem .9rem;
    font-family: 'Space Grotesk', sans-serif;
    font-size: .78rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: .02em;
    transition: background .15s, transform .1s;
    white-space: nowrap;
    text-align: center;
  }
  .preview-btn:hover { background: rgba(124,107,255,.18); transform: scale(1.04); }
  .preview-btn:active { transform: scale(.97); }
  .preview-btn.playing {
    background: rgba(124,107,255,.22);
    border-color: var(--accent);
    animation: preview-pulse .8s ease-in-out infinite alternate;
  }
  @keyframes preview-pulse {
    from { box-shadow: 0 0 6px rgba(124,107,255,.3); }
    to   { box-shadow: 0 0 16px rgba(124,107,255,.6); }
  }
  .preview-btn.no-preview { opacity: .3; cursor: not-allowed; }

  /* Played button */
  .played-btn {
    flex-shrink: 0;
    background: rgba(61,255,192,.07);
    border: 1px solid rgba(61,255,192,.18);
    color: var(--green);
    border-radius: 10px;
    padding: .45rem .9rem;
    font-family: 'Space Grotesk', sans-serif;
    font-size: .78rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: .02em;
    transition: background .15s, transform .1s, box-shadow .15s;
    white-space: nowrap;
    text-align: center;
  }
  .played-btn:hover {
    background: rgba(61,255,192,.16);
    box-shadow: 0 0 12px rgba(61,255,192,.15);
    transform: scale(1.04);
  }
  .played-btn:active { transform: scale(.97); }
  .played-btn.done {
    background: rgba(255,107,77,.06);
    border-color: rgba(255,107,77,.2);
    color: rgba(255,107,77,.7);
  }
  .played-btn.done:hover {
    background: rgba(255,107,77,.14);
    box-shadow: none;
  }

  /* Divider */
  .section-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: .5rem 0 0;
  }

  /* Empty */
  .empty {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--sub);
  }
  .empty-icon { font-size: 2.8rem; margin-bottom: .7rem; }
  .empty-text { font-size: .9rem; font-weight: 500; }
</style>
</head>

<style>
  /* ── Picker overlay ── */
  #picker-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    backdrop-filter: blur(12px);
  }
  #picker-overlay.hidden { display: none; }

  .picker-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem 1.8rem;
    width: min(400px, 92vw);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    color: var(--text);
  }
  .picker-title {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: .4rem;
    letter-spacing: -.01em;
  }
  .picker-sub {
    font-size: .82rem;
    color: var(--sub);

    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: .95rem;

    cursor: pointer;
    text-align: left;
    transition: background .15s, border-color .15s;
  }
  .sheet-btn:hover {
    background: rgba(124,107,255,.14);

  .picker-loading {
    color: #55557a;
    font-size: .88rem;
    font-weight: 500;

    padding: 1rem 0;
  }
  .picker-error { color: #ff4d8d; font-size: .85rem; text-align: center; padding: .5rem 0; }
  .change-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;

  .change-btn:hover { color: #e4e4f2; border-color: rgba(255,255,255,0.25); }
</style>

<!-- Picker overlay -->
<div id="picker-overlay">
  <div class="picker-box">
    <div class="picker-title">🎛️ Party auswählen</div>
    <div class="picker-sub">Wähle aus, welche Party-Anfragen angezeigt werden sollen.</div>
    <div class="sheet-list" id="sheet-list">
      <div class="picker-loading">Lade Partys…</div>
    </div>
    <div class="picker-error" id="picker-error" style="display:none"></div>
  </div>
</div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzn_W5lZaeNceZrZFM6ouqxB29JskARYSOc-xxmPiZBYHuHn6HWdrDLWvWVG67Px37_iQ/exec";
  const SPREADSHEET_ID  = "1hsz89i9dutj4LpV8w5r-fs8whDBE92qlNiRDzLAbHPk";
  let SHEET_CSV_URL = "";
</script>

<header>
  <div class="header-left">
    <div class="dj-title">🎛️ Song Requests</div>
    <div class="live-badge"><div class="live-dot"></div>Live</div>
  </div>
  <div id="party-label" style="font-size:1rem;font-weight:700;color:var(--text);letter-spacing:-.01em;opacity:.7;"></div>
  <div class="header-right">
    <span id="update-label">Verbinde…</span>
    <button class="change-btn" id="theme-toggle" onclick="toggleLight()">☀️ Hell</button>
    <button class="change-btn" id="change-btn" onclick="openPicker()" style="display:none">Ändern</button>
  </div>
</header>

<main>
  <div class="section-label">
    🎵 Ausstehend <span class="badge" id="pending-count">0</span>
  </div>
  <div id="pending-list"></div>
  <div class="empty" id="empty-state">
    <div class="empty-icon">🎵</div>
    <div class="empty-text">Noch keine Anfragen — sie erscheinen hier!</div>
  </div>

  <div id="played-section" style="display:none">
    <hr class="section-divider">
    <div class="section-label" style="margin-top:1rem">
      ✓ Gespielt <span class="badge" id="played-count">0</span>
    </div>
    <div id="played-list"></div>
  </div>
</main>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const playedIds  = new Set(JSON.parse(localStorage.getItem('dj_played_v1') || '[]'));
const artCache   = {};   // id → artwork url
const cardEls    = {};   // id → DOM element
const knownIds   = new Set();
let   lastFetch  = null;
let   tickTimer  = null;

// ── CSV parser ────────────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  for (const raw of text.split('\n')) {
    const line = raw.trim();
    if (!line) continue;
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ && line[i+1] === '"' ? (cur += '"', i++) : (inQ = !inQ); }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

// ── iTunes track info (artwork + preview) ─────────────────────────────────
async function fetchTrackInfo(song, artist) {
  const q = encodeURIComponent(`${song} ${artist}`);
  try {
    const r = await fetch(`https://itunes.apple.com/search?term=${q}&entity=song&limit=1`);
    const d = await r.json();
    const t = d.results?.[0];
    if (t) return {
      artwork:    t.artworkUrl100?.replace('100x100bb', '300x300bb') || null,
      previewUrl: t.previewUrl || null
    };
  } catch(e) {}
  return { artwork: null, previewUrl: null };
}

// ── Audio preview ─────────────────────────────────────────────────────────
const audio = new Audio();
let playingId = null;

function togglePreview(id, url, btn) {
  if (playingId === id) {
    audio.pause();
    audio.currentTime = 0;
    playingId = null;
    btn.textContent = '▶ Vorschau';
    btn.classList.remove('playing');
    return;
  }
  // Stop previous
  document.querySelectorAll('.preview-btn.playing').forEach(b => {
    b.textContent = '▶ Vorschau';
    b.classList.remove('playing');
  });
  audio.src = url;
  audio.play();
  playingId = id;
  btn.textContent = '■ Stop';
  btn.classList.add('playing');
  audio.onended = () => {
    playingId = null;
    btn.textContent = '▶ Vorschau';
    btn.classList.remove('playing');
  };
}

// ── Build card element ────────────────────────────────────────────────────
function buildCard(req, isNew) {
  const div = document.createElement('div');
  const isDone = playedIds.has(req.id);
  div.className = 'card' + (isNew ? ' new-card' : '') + (isDone ? ' played' : '');
  div.dataset.id = req.id;

  const art = req.artwork
    ? `<img class="card-art" src="${req.artwork}" alt="" loading="lazy">`
    : `<div class="card-art-placeholder">🎵</div>`;

  const hasPreview = !!req.previewUrl;
  div.innerHTML = `
    ${art}
    <div class="card-info">
      <div class="card-song">${esc(req.song)}</div>
      <div class="card-artist">${esc(req.artist)}</div>
      <div class="card-requester">Angefragt von <em>${esc(req.requestedBy || 'Anonym')}</em></div>
    </div>
    <div class="card-actions">
      <button class="preview-btn${hasPreview ? '' : ' no-preview'}" data-id="${req.id}">
        ${hasPreview ? '▶ Vorschau' : '▶ Keine Vorschau'}
      </button>
      <button class="played-btn${isDone ? ' done' : ''}" data-id="${req.id}">
        ${isDone ? '↩ Rückgängig' : '✓ Gespielt'}
      </button>
    </div>
  `;

  if (hasPreview) {
    div.querySelector('.preview-btn').addEventListener('click', function() {
      togglePreview(req.id, req.previewUrl, this);
    });
  }

  return div;
}

// ── Played / Undo ─────────────────────────────────────────────────────────
document.addEventListener('click', e => {
  const btn = e.target.closest('.played-btn');
  if (!btn) return;
  const id = btn.dataset.id;
  const card = cardEls[id];
  if (!card) return;

  if (playedIds.has(id)) {
    // Undo
    playedIds.delete(id);
    localStorage.setItem('dj_played_v1', JSON.stringify([...playedIds]));
    card.classList.remove('played');
    btn.classList.remove('done');
    btn.textContent = '✓ Gespielt';
    document.getElementById('pending-list').prepend(card);
  } else {
    // Mark played
    playedIds.add(id);
    localStorage.setItem('dj_played_v1', JSON.stringify([...playedIds]));
    card.classList.add('played');
    btn.classList.add('done');
    btn.textContent = '↩ Rückgängig';
    document.getElementById('played-list').prepend(card);
  }
  updateCounts();
});

// ── Update counts & visibility ────────────────────────────────────────────
function updateCounts() {
  const pendingList = document.getElementById('pending-list');
  const playedList  = document.getElementById('played-list');
  const pCount = pendingList.children.length;
  const dCount = playedList.children.length;

  document.getElementById('pending-count').textContent = pCount;
  document.getElementById('played-count').textContent  = dCount;
  document.getElementById('empty-state').style.display  = pCount === 0 ? 'block' : 'none';
  document.getElementById('played-section').style.display = dCount === 0 ? 'none' : 'block';
}

// ── Fetch & refresh ───────────────────────────────────────────────────────
async function refresh() {
  try {
    const res  = await fetch(SHEET_CSV_URL + '&_=' + Date.now());
    const text = await res.text();
    const rows = parseCSV(text).slice(1); // skip header

    const newOnes = [];
    for (const row of rows) {
      if (row.length < 3 || !row[1]) continue;
      const [ts, song, artist, , requestedBy] = row;
      const id = `${song.trim().toLowerCase()}|${artist.trim().toLowerCase()}`;
      if (!knownIds.has(id)) {
        knownIds.add(id);
        newOnes.push({ id, song: song.trim(), artist: artist.trim(), requestedBy: (requestedBy || '').trim(), artwork: null });
      }
    }

    if (newOnes.length) {
      await Promise.all(newOnes.map(async req => {
        if (!artCache[req.id]) artCache[req.id] = await fetchTrackInfo(req.song, req.artist);
        req.artwork    = artCache[req.id]?.artwork    || null;
        req.previewUrl = artCache[req.id]?.previewUrl || null;
      }));

      const pendingList = document.getElementById('pending-list');
      const playedList  = document.getElementById('played-list');

      // Newest at top — insert in reverse order so first item ends up on top
      for (const req of [...newOnes].reverse()) {
        const card = buildCard(req, true);
        cardEls[req.id] = card;
        if (playedIds.has(req.id)) playedList.prepend(card);
        else pendingList.prepend(card);
      }
      updateCounts();
    }

    lastFetch = Date.now();
    startTick();
  } catch(e) {
    document.getElementById('update-label').textContent = 'Verbindungsfehler — erneuter Versuch…';
    console.error(e);
  }
}

// ── "Updated Xs ago" ticker ───────────────────────────────────────────────
function startTick() {
  clearInterval(tickTimer);
  tickTimer = setInterval(() => {
    if (!lastFetch) return;
    const s = Math.round((Date.now() - lastFetch) / 1000);
    document.getElementById('update-label').textContent =
      s < 5 ? 'Gerade aktualisiert' : `Vor ${s}s aktualisiert`;
  }, 1000);
}

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Picker ────────────────────────────────────────────────────────────────
let refreshInterval = null;

async function openPicker() {
  document.getElementById('picker-overlay').classList.remove('hidden');
  document.getElementById('picker-error').style.display = 'none';
  document.getElementById('sheet-list').innerHTML = '<div class="picker-loading">Lade Partys…</div>';
  try {
    const r = await fetch(`${APPS_SCRIPT_URL}?action=getSheets`);
    const sheets = await r.json();
    if (!sheets.length) {
      document.getElementById('sheet-list').innerHTML = '';
      document.getElementById('picker-error').textContent = 'Noch keine Party-Blätter gefunden. Erstelle zuerst eine im Admin-Bereich.';
      document.getElementById('picker-error').style.display = 'block';
      return;
    }
    document.getElementById('sheet-list').innerHTML = '';
    sheets.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'sheet-btn';
      btn.textContent = '🎉 ' + name;
      btn.addEventListener('click', () => selectSheet(name));
      document.getElementById('sheet-list').appendChild(btn);
    });
  } catch(e) {
    document.getElementById('sheet-list').innerHTML = '';
    document.getElementById('picker-error').textContent = 'Partys konnten nicht geladen werden. Überprüfe deine Apps Script URL.';
    document.getElementById('picker-error').style.display = 'block';
  }
}

function selectSheet(name) {
  localStorage.setItem('dj_display_sheet', name);
  SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
  document.getElementById('picker-overlay').classList.add('hidden');
  document.getElementById('change-btn').style.display = 'inline-block';
  document.getElementById('party-label').textContent = `🎉 ${name}`;
  document.getElementById('update-label').textContent = 'Verbinde…';
  // Reset state for new sheet
  knownIds.clear();
  Object.keys(cardEls).forEach(k => delete cardEls[k]);
  document.getElementById('pending-list').innerHTML = '';
  document.getElementById('played-list').innerHTML = '';
  clearInterval(refreshInterval);
  refresh();
  refreshInterval = setInterval(refresh, 5000);
}

// ── Light / dark toggle ───────────────────────────────────────────────────
function toggleLight() {
  const isLight = document.documentElement.classList.toggle('light');
  localStorage.setItem('dj_display_theme', isLight ? 'light' : 'dark');
  document.getElementById('theme-toggle').textContent = isLight ? '🌙 Dunkel' : '☀️ Hell';
}
if (localStorage.getItem('dj_display_theme') === 'light') {
  document.documentElement.classList.add('light');
  document.getElementById('theme-toggle').textContent = '🌙 Dunkel';
}

// ── Boot ──────────────────────────────────────────────────────────────────
const savedSheet = localStorage.getItem('dj_display_sheet');
if (savedSheet) {
  selectSheet(savedSheet);
} else {
  openPicker();
}
</script>
</body>
</html>
